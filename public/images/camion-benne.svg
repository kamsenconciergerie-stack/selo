<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Camion benne -->
  <!-- Châssis -->
  <rect x="50" y="180" width="300" height="20" rx="4" fill="#374151"/>
  
  <!-- Cabine -->
  <rect x="50" y="120" width="100" height="80" rx="8" fill="#1e3a8a" stroke="#f97316" stroke-width="2"/>
  <rect x="60" y="130" width="35" height="25" rx="2" fill="#e5e7eb" stroke="#f97316" stroke-width="1"/>
  <rect x="105" y="130" width="35" height="25" rx="2" fill="#e5e7eb" stroke="#f97316" stroke-width="1"/>
  
  <!-- Capot -->
  <rect x="20" y="140" width="30" height="40" rx="6" fill="#374151" stroke="#f97316" stroke-width="2"/>
  
  <!-- Benne basculante -->
  <path d="M170 120 L340 120 L360 180 L170 180 Z" fill="#f97316" stroke="#1e3a8a" stroke-width="2"/>
  <rect x="175" y="125" width="160" height="50" fill="#fed7aa"/>
  
  <!-- Support hydraulique -->
  <rect x="150" y="160" width="20" height="40" fill="#374151"/>
  <circle cx="160" cy="170" r="5" fill="#f97316"/>
  
  <!-- Roues avant -->
  <circle cx="80" cy="220" r="25" fill="#374151" stroke="#f97316" stroke-width="2"/>
  <circle cx="80" cy="220" r="18" fill="#1f2937"/>
  <circle cx="80" cy="220" r="8" fill="#9ca3af"/>
  
  <!-- Roues arrière (jumelées) -->
  <circle cx="280" cy="220" r="25" fill="#374151" stroke="#f97316" stroke-width="2"/>
  <circle cx="280" cy="220" r="18" fill="#1f2937"/>
  <circle cx="280" cy="220" r="8" fill="#9ca3af"/>
  
  <circle cx="320" cy="220" r="25" fill="#374151" stroke="#f97316" stroke-width="2"/>
  <circle cx="320" cy="220" r="18" fill="#1f2937"/>
  <circle cx="320" cy="220" r="8" fill="#9ca3af"/>
  
  <!-- Phares -->
  <circle cx="25" cy="150" r="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="25" cy="170" r="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  
  <!-- Logo Aywa -->
  <rect x="320" y="20" width="60" height="30" rx="4" fill="#1e3a8a"/>
  <text x="350" y="40" text-anchor="middle" fill="#f97316" font-family="Arial, sans-serif" font-size="16" font-weight="bold">AYWA</text>
</svg>