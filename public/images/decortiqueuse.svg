<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Décortiqueuse -->
  <!-- Bâti principal -->
  <rect x="120" y="160" width="160" height="80" rx="8" fill="#1e3a8a" stroke="#f97316" stroke-width="2"/>
  
  <!-- Chambre de décorticage -->
  <circle cx="200" cy="190" r="35" fill="#f97316" stroke="#1e3a8a" stroke-width="3"/>
  <circle cx="200" cy="190" r="25" fill="#fed7aa"/>
  
  <!-- Rotor interne -->
  <circle cx="200" cy="190" r="15" fill="#374151"/>
  <rect x="195" y="180" width="10" height="20" fill="#6b7280"/>
  <rect x="190" y="185" width="20" height="10" fill="#6b7280"/>
  
  <!-- Trémie d'alimentation -->
  <path d="M170 120 L230 120 L220 160 L180 160 Z" fill="#6b7280" stroke="#f97316" stroke-width="2"/>
  
  <!-- Produit à décortiquer (riz/arachide) -->
  <circle cx="190" cy="135" r="2" fill="#92400e"/>
  <circle cx="205" cy="140" r="2" fill="#92400e"/>
  <circle cx="180" cy="145" r="2" fill="#92400e"/>
  <circle cx="215" cy="130" r="2" fill="#92400e"/>
  <circle cx="195" cy="150" r="2" fill="#92400e"/>
  
  <!-- Moteur électrique -->
  <rect x="280" y="170" width="50" height="40" rx="6" fill="#dc2626" stroke="#f97316" stroke-width="2"/>
  <rect x="285" y="175" width="40" height="8" fill="#6b7280"/>
  <rect x="290" y="185" width="30" height="15" rx="3" fill="#374151"/>
  
  <!-- Courroie de transmission -->
  <ellipse cx="255" cy="190" rx="15" ry="8" fill="none" stroke="#374151" stroke-width="3"/>
  <ellipse cx="305" cy="190" rx="12" ry="6" fill="none" stroke="#374151" stroke-width="3"/>
  <path d="M240 185 L293 185" stroke="#374151" stroke-width="3"/>
  <path d="M240 195 L293 195" stroke="#374151" stroke-width="3"/>
  
  <!-- Sortie produit décortiqué -->
  <rect x="80" y="220" width="60" height="20" rx="4" fill="#6b7280"/>
  <path d="M140 215 Q160 210 180 220" stroke="#374151" stroke-width="4" fill="none"/>
  
  <!-- Produit décortiqué qui sort -->
  <circle cx="95" cy="225" r="1.5" fill="#fef3c7"/>
  <circle cx="105" cy="228" r="1.5" fill="#fef3c7"/>
  <circle cx="115" cy="224" r="1.5" fill="#fef3c7"/>
  <circle cx="125" cy="230" r="1.5" fill="#fef3c7"/>
  
  <!-- Sortie déchets (coques) -->
  <rect x="260" y="220" width="60" height="20" rx="4" fill="#6b7280"/>
  <path d="M220 215 Q240 210 260 220" stroke="#374151" stroke-width="4" fill="none"/>
  
  <!-- Déchets qui sortent -->
  <ellipse cx="275" cy="225" rx="2" ry="1" fill="#92400e"/>
  <ellipse cx="290" cy="228" rx="2" ry="1" fill="#92400e"/>
  <ellipse cx="305" cy="224" rx="2" ry="1" fill="#92400e"/>
  
  <!-- Support -->
  <rect x="140" y="240" width="120" height="20" rx="4" fill="#374151"/>
  <rect x="170" y="260" width="10" height="20" fill="#6b7280"/>
  <rect x="220" y="260" width="10" height="20" fill="#6b7280"/>
  
  <!-- Panneau de contrôle -->
  <rect x="150" y="140" width="30" height="20" rx="3" fill="#e5e7eb" stroke="#374151" stroke-width="1"/>
  <circle cx="160" cy="148" r="2" fill="#22c55e"/>
  <circle cx="170" cy="148" r="2" fill="#dc2626"/>
  <rect x="155" y="152" width="20" height="4" rx="2" fill="#6b7280"/>
  
  <!-- Logo Aywa -->
  <rect x="320" y="20" width="60" height="30" rx="4" fill="#1e3a8a"/>
  <text x="350" y="40" text-anchor="middle" fill="#f97316" font-family="Arial, sans-serif" font-size="16" font-weight="bold">AYWA</text>
</svg>