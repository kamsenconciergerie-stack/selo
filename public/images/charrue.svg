<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Charrue -->
  <!-- Bâti principal -->
  <rect x="80" y="140" width="240" height="20" rx="4" fill="#1e3a8a" stroke="#f97316" stroke-width="2"/>
  
  <!-- Support d'attelage -->
  <rect x="60" y="130" width="40" height="40" rx="6" fill="#374151" stroke="#f97316" stroke-width="2"/>
  <circle cx="80" cy="150" r="8" fill="#f97316"/>
  
  <!-- Socs de charrue (3 socs) -->
  <path d="M120 160 L150 180 L180 160 L150 140 Z" fill="#6b7280" stroke="#1e3a8a" stroke-width="2"/>
  <path d="M180 160 L210 180 L240 160 L210 140 Z" fill="#6b7280" stroke="#1e3a8a" stroke-width="2"/>
  <path d="M240 160 L270 180 L300 160 L270 140 Z" fill="#6b7280" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Versoirs -->
  <path d="M130 140 L170 120 L190 140 L150 160 Z" fill="#f97316" stroke="#1e3a8a" stroke-width="2"/>
  <path d="M190 140 L230 120 L250 140 L210 160 Z" fill="#f97316" stroke="#1e3a8a" stroke-width="2"/>
  <path d="M250 140 L290 120 L310 140 L270 160 Z" fill="#f97316" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Étançons -->
  <rect x="148" y="120" width="4" height="40" fill="#374151"/>
  <rect x="208" y="120" width="4" height="40" fill="#374151"/>
  <rect x="268" y="120" width="4" height="40" fill="#374151"/>
  
  <!-- Roue de jauge -->
  <circle cx="320" cy="180" r="15" fill="#374151" stroke="#f97316" stroke-width="2"/>
  <circle cx="320" cy="180" r="8" fill="#9ca3af"/>
  
  <!-- Support de roue -->
  <rect x="315" y="160" width="10" height="20" fill="#6b7280"/>
  <rect x="300" y="155" width="40" height="8" fill="#1e3a8a"/>
  
  <!-- Sillons dans le sol -->
  <path d="M120 200 Q150 210 180 200" stroke="#8b5cf6" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M180 200 Q210 210 240 200" stroke="#8b5cf6" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M240 200 Q270 210 300 200" stroke="#8b5cf6" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Logo Aywa -->
  <rect x="20" y="20" width="60" height="30" rx="4" fill="#1e2a4a"/>
  <text x="50" y="40" text-anchor="middle" fill="#f97316" font-family="Arial, sans-serif" font-size="16" font-weight="bold">AYWA</text>
</svg>