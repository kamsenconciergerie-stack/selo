<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 140" width="450" height="140">
  <!-- Background rectangle with blue border -->
  <rect x="4" y="4" width="442" height="132" fill="white" stroke="#3b82f6" stroke-width="6" rx="6"/>
  
  <!-- Left blue section -->
  <rect x="12" y="12" width="130" height="116" fill="#3b82f6" rx="4"/>
  
  <!-- Building/crane icon in orange -->
  <g transform="translate(77, 70)">
    <!-- Buildings -->
    <rect x="-25" y="-20" width="10" height="30" fill="#ff6b35" rx="1"/>
    <rect x="-10" y="-25" width="10" height="35" fill="#ff6b35" rx="1"/>
    <rect x="5" y="-15" width="10" height="25" fill="#ff6b35" rx="1"/>
    <rect x="20" y="-22" width="10" height="32" fill="#ff6b35" rx="1"/>
    
    <!-- Crane structure -->
    <rect x="-30" y="-35" width="65" height="6" fill="#ff6b35" rx="1"/>
    <rect x="-30" y="-40" width="6" height="20" fill="#ff6b35"/>
    <rect x="29" y="-40" width="6" height="12" fill="#ff6b35"/>
    
    <!-- Hook -->
    <circle cx="32" cy="-25" r="3" fill="#ff6b35"/>
    <rect x="31" y="-22" width="2" height="8" fill="#ff6b35"/>
  </g>
  
  <!-- KAMSEN text -->
  <text x="160" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ff6b35" letter-spacing="2px">KAMSEN</text>
  
  <!-- Blue background for slogan -->
  <rect x="160" y="90" width="270" height="30" fill="#3b82f6" rx="4"/>
  
  <!-- Slogan text -->
  <text x="170" y="109" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="white" letter-spacing="1px">DES CHARGES EN MOINS</text>
</svg>