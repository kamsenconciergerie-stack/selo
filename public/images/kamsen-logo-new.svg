<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Background rectangle with blue border -->
  <rect x="2" y="2" width="396" height="116" fill="#f8f9fa" stroke="#3b82f6" stroke-width="4" rx="4"/>
  
  <!-- Left blue section with logo -->
  <rect x="8" y="8" width="120" height="104" fill="#3b82f6" rx="2"/>
  
  <!-- Stylized building/crane icon in orange -->
  <g transform="translate(68, 60)">
    <!-- Main building structure -->
    <rect x="-20" y="-15" width="8" height="25" fill="#ff6b35"/>
    <rect x="-8" y="-20" width="8" height="30" fill="#ff6b35"/>
    <rect x="4" y="-12" width="8" height="22" fill="#ff6b35"/>
    <rect x="16" y="-18" width="8" height="28" fill="#ff6b35"/>
    
    <!-- Crane arm -->
    <rect x="-25" y="-25" width="55" height="4" fill="#ff6b35"/>
    <rect x="-25" y="-30" width="4" height="15" fill="#ff6b35"/>
    <rect x="26" y="-30" width="4" height="8" fill="#ff6b35"/>
    
    <!-- Hook -->
    <circle cx="28" cy="-18" r="2" fill="#ff6b35"/>
  </g>
  
  <!-- KAMSEN text in orange -->
  <text x="150" y="70" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ff6b35">KAMSEN</text>
  
  <!-- Blue background for slogan -->
  <rect x="150" y="80" width="220" height="25" fill="#3b82f6" rx="2"/>
  
  <!-- DES CHARGES EN MOINS text in white -->
  <text x="160" y="97" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="white">DES CHARGES EN MOINS</text>
</svg>