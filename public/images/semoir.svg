<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Semoir mécanique -->
  <!-- Bâti principal -->
  <rect x="100" y="140" width="200" height="30" rx="6" fill="#1e3a8a" stroke="#f97316" stroke-width="2"/>
  
  <!-- Trémie à graines -->
  <path d="M120 100 L280 100 L260 140 L140 140 Z" fill="#f97316" stroke="#1e3a8a" stroke-width="2"/>
  <rect x="130" y="110" width="140" height="25" fill="#fed7aa"/>
  
  <!-- Graines visibles -->
  <circle cx="150" cy="120" r="2" fill="#eab308"/>
  <circle cx="165" cy="125" r="2" fill="#eab308"/>
  <circle cx="180" cy="118" r="2" fill="#eab308"/>
  <circle cx="195" cy="128" r="2" fill="#eab308"/>
  <circle cx="210" cy="122" r="2" fill="#eab308"/>
  <circle cx="225" cy="126" r="2" fill="#eab308"/>
  <circle cx="240" cy="119" r="2" fill="#eab308"/>
  <circle cx="255" cy="124" r="2" fill="#eab308"/>
  
  <!-- Couvercle trémie -->
  <rect x="125" y="95" width="150" height="10" rx="3" fill="#6b7280"/>
  <circle cx="200" cy="100" r="3" fill="#374151"/>
  
  <!-- Socs semeurs -->
  <path d="M140 170 L155 190 L140 200 L125 180 Z" fill="#6b7280" stroke="#1e3a8a" stroke-width="1"/>
  <path d="M180 170 L195 190 L180 200 L165 180 Z" fill="#6b7280" stroke="#1e3a8a" stroke-width="1"/>
  <path d="M220 170 L235 190 L220 200 L205 180 Z" fill="#6b7280" stroke="#1e3a8a" stroke-width="1"/>
  <path d="M260 170 L275 190 L260 200 L245 180 Z" fill="#6b7280" stroke="#1e3a8a" stroke-width="1"/>
  
  <!-- Conduites de distribution -->
  <rect x="145" y="140" width="4" height="30" fill="#374151"/>
  <rect x="185" y="140" width="4" height="30" fill="#374151"/>
  <rect x="225" y="140" width="4" height="30" fill="#374151"/>
  <rect x="265" y="140" width="4" height="30" fill="#374151"/>
  
  <!-- Mécanisme de distribution -->
  <circle cx="200" cy="120" r="8" fill="#374151" stroke="#f97316" stroke-width="2"/>
  <rect x="196" y="116" width="8" height="8" fill="#f97316"/>
  
  <!-- Roues de fermeture -->
  <circle cx="160" cy="210" r="12" fill="#374151" stroke="#f97316" stroke-width="2"/>
  <circle cx="160" cy="210" r="6" fill="#9ca3af"/>
  
  <circle cx="240" cy="210" r="12" fill="#374151" stroke="#f97316" stroke-width="2"/>
  <circle cx="240" cy="210" r="6" fill="#9ca3af"/>
  
  <!-- Chaîne de transmission -->
  <circle cx="80" cy="160" r="8" fill="#6b7280"/>
  <circle cx="200" cy="130" r="6" fill="#6b7280"/>
  <path d="M85 155 Q140 125 195 128" stroke="#374151" stroke-width="2" fill="none"/>
  <path d="M85 165 Q140 135 195 132" stroke="#374151" stroke-width="2" fill="none"/>
  
  <!-- Attelage -->
  <rect x="60" y="140" width="40" height="30" rx="6" fill="#374151" stroke="#f97316" stroke-width="2"/>
  <circle cx="80" cy="155" r="8" fill="#f97316"/>
  
  <!-- Graines semées -->
  <circle cx="145" cy="220" r="1" fill="#eab308"/>
  <circle cx="185" cy="225" r="1" fill="#eab308"/>
  <circle cx="225" cy="222" r="1" fill="#eab308"/>
  <circle cx="265" cy="226" r="1" fill="#eab308"/>
  
  <!-- Logo Aywa -->
  <rect x="20" y="20" width="60" height="30" rx="4" fill="#1e2a4a"/>
  <text x="50" y="40" text-anchor="middle" fill="#f97316" font-family="Arial, sans-serif" font-size="16" font-weight="bold">AYWA</text>
</svg>